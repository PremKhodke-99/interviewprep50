<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Security headers -->
  <meta http-equiv="X-Content-Type-Options" content="nosniff">
  <meta http-equiv="X-Frame-Options" content="DENY">
  <meta http-equiv="Referrer-Policy" content="strict-origin-when-cross-origin">
  <meta http-equiv="Permissions-Policy" content="camera=(), microphone=(), geolocation=()">
  <meta http-equiv="Content-Security-Policy"
    content="default-src 'self'; script-src 'self'; style-src 'self' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; connect-src 'none'; frame-ancestors 'none'; base-uri 'self'; form-action 'self';">

  <!-- SEO -->
  <title>50 Basic Full Stack Interview Questions — React, JS, CSS, Node &amp; More</title>
  <meta name="description"
    content="50 beginner-level full-stack developer interview questions covering React, JavaScript, CSS, TailwindCSS, Node.js, Linux, MySQL, MongoDB, Git and more.">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap">

  <!-- Stylesheet -->
  <link rel="stylesheet" href="css/styles.css">

  <!-- Theme: runs before body to prevent FOUC -->
  <script src="../assets/js/theme.js"></script>
</head>

<body>

  <!-- Skip navigation link (keyboard / AT users) -->
  <a href="#main-content" class="skip-link">Skip to main content</a>

  <!-- ARIA live region for dynamic announcements -->
  <div id="a11y-live" role="status" aria-live="polite" aria-atomic="true"></div>

  <div class="wrap">

    <iqhub-header badge="Beginner Edition · 2026" title="50 <em>Basic</em> Questions<br>Full Stack Dev" sub="React · JS · CSS · Node · Linux · MySQL · MongoDB · Webpack · Webhooks · Git"></iqhub-header>

    <main id="main-content">

      <!-- Filters -->
      <iqhub-filters diffs="Easy,Medium"></iqhub-filters>

      <!-- Question list -->
      <section aria-label="Interview questions" aria-live="polite" aria-relevant="additions removals">
        <div class="ql" id="ql" role="list"></div>
      </section>

    </main>

    <iqhub-footer></iqhub-footer>
    

  </div><!-- /.wrap -->

  <!-- App JS (deferred) -->
  <script src="../components/iqhub-components.js" defer></script>
  <script src="../assets/js/core-app.js" defer></script>
  <script src="js/app.js" defer></script>
</body>

</html>
